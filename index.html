<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đèn Kéo Quân 3D - Bài Tập 20</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        h1 {
            margin-bottom: 8px;
            color: #38bdf8;
            font-size: 28px;
        }

        p.instruction {
            margin-bottom: 50px;
            color: #94a3b8;
            font-style: italic;
            font-size: 14px;
        }

        /* Khung hiển thị không gian 3D */
        .stage {
            width: 210px;
            height: 280px;
            perspective: 1000px; /* Tạo độ sâu 3D */
        }

        /* Lồng quay chứa 6 mặt */
        .carousel {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d; /* Cho phép các con xếp theo không gian 3D */
            cursor: pointer;
        }

        /* Mỗi mặt của đèn kéo quân */
        .face {
            position: absolute;
            width: 200px;
            height: 260px;
            left: 5px;
            top: 10px;
            border: 3px solid #fbbf24;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
            background: #1e293b;
        }

        .face img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Định vị 6 mặt xoay đều tạo thành hình lăng trụ lục giác (60 độ/mặt, bán kính 180px) */
        .face:nth-child(1) { transform: rotateY(0deg) translateZ(180px); }
        .face:nth-child(2) { transform: rotateY(60deg) translateZ(180px); }
        .face:nth-child(3) { transform: rotateY(120deg) translateZ(180px); }
        .face:nth-child(4) { transform: rotateY(180deg) translateZ(180px); }
        .face:nth-child(5) { transform: rotateY(240deg) translateZ(180px); }
        .face:nth-child(6) { transform: rotateY(300deg) translateZ(180px); }

    </style>
</head>
<body>

    <h1>ĐÈN KÉO QUÂN 3D</h1>
    <p class="instruction">💡 Rê chuột vào đèn để DỪNG - Rê chuột ra để QUAY TIẾP</p>

    <div class="stage">
        <div class="carousel" id="carousel">
            <!-- Thay các đường dẫn img/anh1.jpg bằng ảnh chụp của bạn -->
            <div class="face"><img src="https://picsum.photos/id/1015/300/400" alt="Ảnh 1"></div>
            <div class="face"><img src="https://picsum.photos/id/1025/300/400" alt="Ảnh 2"></div>
            <div class="face"><img src="https://picsum.photos/id/1035/300/400" alt="Ảnh 3"></div>
            <div class="face"><img src="https://picsum.photos/id/1040/300/400" alt="Ảnh 4"></div>
            <div class="face"><img src="https://picsum.photos/id/1050/300/400" alt="Ảnh 5"></div>
            <div class="face"><img src="https://picsum.photos/id/1060/300/400" alt="Ảnh 6"></div>
        </div>
    </div>

    <script>
        const carousel = document.getElementById('carousel');
        let currentAngle = 0;
        let isPaused = false;

        // Hàm liên tục tăng góc xoay
        function rotateCarousel() {
            if (!isPaused) {
                currentAngle += 0.5; // Tăng/giảm số này để chỉnh tốc độ quay
                carousel.style.transform = `rotateY(${currentAngle}deg)`;
            }
            requestAnimationFrame(rotateCarousel);
        }

        // Tương tác rê chuột
        carousel.addEventListener('mouseenter', () => {
            isPaused = true; // Dừng lại khi di chuột vào
        });

        carousel.addEventListener('mouseleave', () => {
            isPaused = false; // Tiếp tục quay khi đưa chuột ra ngoài
        });

        // Chạy hiệu ứng xoay
        rotateCarousel();
    </script>

</body>
</html>
