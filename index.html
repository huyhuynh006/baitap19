<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài tập 19: Memory Card Flip Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body { background: #0f172a; color: #f8fafc; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    header { text-align: center; margin-bottom: 20px; }
    h1 { color: #38bdf8; margin-bottom: 8px; }
    .stats-board { display: flex; gap: 20px; margin-bottom: 20px; align-items: center; }
    .stats-item { background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 8px; }
    .btn-reset { background: #38bdf8; color: #0f172a; border: none; padding: 8px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    main { width: 100%; max-width: 600px; }
    .game-board { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; perspective: 1000px; }
    @media (min-width: 600px) { .game-board { grid-template-columns: repeat(4, 1fr); } }
    .card { height: 120px; position: relative; transform-style: preserve-3d; transition: transform 0.6s; cursor: pointer; }
    .card.flipped, .card.matched { transform: rotateY(180deg); }
    .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 2.5rem; user-select: none; }
    .card-front { background: #3b82f6; border: 2px solid #60a5fa; }
    .card-back { background: #f8fafc; color: #0f172a; transform: rotateY(180deg); }
    .win-message { margin-top: 20px; padding: 12px; background: #22c55e; color: #fff; font-weight: bold; border-radius: 8px; display: none; }
    .nav-link { margin-top: 30px; color: #94a3b8; text-decoration: none; }
  </style>
</head>
<body>
  <header><h1>Memory Card Flip</h1><p>Ghép 4 cặp thẻ giống nhau</p></header>
  <div class="stats-board">
    <div class="stats-item">Lượt click: <span id="move-count">0</span></div>
    <button class="btn-reset" onclick="resetGame()">Chơi lại</button>
  </div>
  <main><section class="game-board" id="game-board"></section></main>
  <div class="win-message" id="win-message">🎉 Chúc mừng! Bạn đã hoàn thành trong <span id="final-moves">0</span> lượt!</div>
  <a href="bt_masv.html" class="nav-link">← Quay lại trang chủ</a>

  <script>
    const icons = ['🍕', '🚀', '🐱', '🎮', '🍕', '🚀', '🐱', '🎮'];
    let flippedCards = [], matchedPairs = 0, moves = 0, isBoardLocked = false;
    const gameBoard = document.getElementById('game-board');
    const moveCountElement = document.getElementById('move-count');

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function initGame() {
      gameBoard.innerHTML = ''; flippedCards = []; matchedPairs = 0; moves = 0; isBoardLocked = false;
      moveCountElement.textContent = moves;
      document.getElementById('win-message').style.display = 'none';
      shuffle([...icons]).forEach((icon) => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.dataset.icon = icon;
        card.innerHTML = `<div class="card-face card-front">❓</div><div class="card-face card-back">${icon}</div>`;
        card.addEventListener('click', () => flipCard(card));
        gameBoard.appendChild(card);
      });
    }

    function flipCard(card) {
      if (isBoardLocked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
      card.classList.add('flipped');
      flippedCards.push(card);
      moves++;
      moveCountElement.textContent = moves;
      if (flippedCards.length === 2) checkMatch();
    }

    function checkMatch() {
      isBoardLocked = true;
      const [c1, c2] = flippedCards;
      if (c1.dataset.icon === c2.dataset.icon) {
        c1.classList.add('matched'); c2.classList.add('matched');
        matchedPairs++; flippedCards = []; isBoardLocked = false;
        if (matchedPairs === icons.length / 2) {
          setTimeout(() => {
            document.getElementById('final-moves').textContent = moves;
            document.getElementById('win-message').style.display = 'block';
          }, 400);
        }
      } else {
        setTimeout(() => {
          c1.classList.remove('flipped'); c2.classList.remove('flipped');
          flippedCards = []; isBoardLocked = false;
        }, 1000);
      }
    }
    function resetGame() { initGame(); }
    initGame();
  </script>
</body>
</html>
